# .github/workflows/plugin-docs-ci.yml

name: CI - plugin-docs

on:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/plugin-docs/**'
      - 'packages/docs-theme/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Clean install
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          npm i

      - name: Lint
        run: npm run lint --workspace=plugin-docs

      - name: Build
        run: npm run build --workspace=plugin-docs

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-docs-out
          path: apps/plugin-docs/out/
